# Reverse proxy для Grant Monitor.
# Варіант А: окремий субдомен (рекомендовано, простіше для statics/cookies)
#   Підключити як окремий server block, домен: grants.<ваш-домен>
# Варіант Б: підтека на основному сайті — див. коментар нижче.

server {
    listen 80;
    server_name grants.ЗАМІНИТИ-НА-ДОМЕН;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Варіант Б — якщо хочете на існуючому домені під /grants/ замість субдомена,
# додайте цей location в існуючий server block сайту-лендінгу (замість
# окремого server{} вище) і приберіть server_name/listen тут:
